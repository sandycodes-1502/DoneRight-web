<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - DoneRight</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/globals.css">
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter">
                    <polyline points="4 14 8 18 14 8"></polyline>
                    <line x1="16" y1="8" x2="22" y2="8"></line>
                    <line x1="16" y1="13" x2="22" y2="13"></line>
                    <line x1="16" y1="18" x2="22" y2="18"></line>
                </svg>
                <span>DoneRight</span>
            </div>
            
            <h1 class="auth-title">Welcome back</h1>
            <p class="auth-subtitle">Log in to continue to your dashboard.</p>

            <div class="auth-actions">
                <button id="googleSignInBtn" class="btn secondary-btn full-width auth-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Log in with Google
                </button>
                
                <div class="divider">
                    <span>or</span>
                </div>

                <button id="guestSignInBtn" class="btn primary-btn full-width auth-btn">
                    Log in as Guest
                </button>
            </div>
            
            <p class="auth-footer-text">
                Don't have an account? <a href="/signup">Sign up</a>
            </p>
        </div>
    </div>

    <!-- Firebase SDK configured as module -->
    <script type="module" src="/js/auth.js"></script>
    <script type="module">
        import { setupAuthStateObserver } from '/js/auth.js';
        setupAuthStateObserver((user) => {
            // Redirect already logged in users
            window.location.replace('/dashboard');
        });
    </script>
    <script src="/js/cursor.js"></script>
</body>
</html>
