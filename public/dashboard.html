<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - DoneRight</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/globals.css">
    <link rel="stylesheet" href="/css/nav.css">
    <link rel="stylesheet" href="/css/auth.css">
    <style>
        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            min-height: calc(100vh - 80px); /* Assuming nav is ~80px */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .dashboard-container h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: var(--text-color);
        }
        .dashboard-container p {
            color: var(--text-color-light);
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }
        .dashboard-content {
            background: var(--card-bg);
            padding: 3rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-md);
            width: 100%;
            max-width: 600px;
        }
    </style>
</head>
<body>
    <!-- Main Header / Navigation -->
    <header class="main-nav">
        <div class="nav-container">
            <a href="/" class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
                    <path d="M8 12L11 15L16 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span>DoneRight</span>
            </a>
            <div class="nav-actions">
                <button id="logoutBtn" class="btn secondary-btn btn-sm">Log out</button>
            </div>
        </div>
    </header>

    <main class="dashboard-container">
        <div class="dashboard-content">
            <h1 id="welcomeMessage">Loading Dashboard...</h1>
            <p>Welcome to your personal productivity space.</p>
            <p>We are still building the full dashboard experience. Stay tuned!</p>
        </div>
    </main>

    <script type="module" src="/js/auth.js"></script>
    <script type="module">
        import { setupAuthStateObserver } from '/js/auth.js';
        
        setupAuthStateObserver((user) => {
            // User is logged in
            const welcomeMessage = document.getElementById('welcomeMessage');
            const displayName = user.displayName || 'Guest User';
            welcomeMessage.textContent = `Welcome, ${displayName}!`;
        }, () => {
            // User is logged out, redirect to login
            window.location.href = '/login';
        });
    </script>
    <script src="/js/cursor.js"></script>
</body>
</html>
